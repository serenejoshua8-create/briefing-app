name: Trigger AM/PM briefing

# Backup for the scheduled Claude sessions (am-briefing-source-gather /
# pm-briefing-source-gather), which gather real sources and call
# /api/briefing/run directly — but those only fire while that Claude
# app/session is open on its machine, so this is the reliable server-side
# fallback in case that machine was off. Fires ~25-40 min after the Claude
# tasks' target times to give them room to finish first, and skips the run
# entirely if a record for that date+session already exists (checked via
# GET /api/briefing/:date/:session) so it never overwrites a good
# source-driven result with a weaker no-sources autonomous-search one.
on:
  schedule:
    # 05:45 UTC = 11:15 IST (after the ~10:50 IST Claude task, for the 11:00 AM IST briefing)
    - cron: '45 5 * * *'
    # 12:15 UTC = 17:45 IST (after the ~17:10 IST Claude task, for the 5:30 PM IST briefing)
    - cron: '15 12 * * *'
  workflow_dispatch: {}

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Determine session and IST date
        id: session
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" = "05" ]; then echo "session=AM" >> "$GITHUB_OUTPUT"
          else echo "session=PM" >> "$GITHUB_OUTPUT"
          fi
          echo "date=$(TZ=Asia/Kolkata date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Check if already generated
        id: check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.BACKEND_URL }}/api/briefing/${{ steps.session.outputs.date }}/${{ steps.session.outputs.session }}")
          echo "exists=$([ "$STATUS" = "200" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Call backend (only if not already generated)
        if: steps.check.outputs.exists != 'true'
        run: |
          curl -sf -X POST "${{ secrets.BACKEND_URL }}/api/briefing/run" \
            -H "Content-Type: application/json" \
            -H "x-app-secret: ${{ secrets.APP_SHARED_SECRET }}" \
            -d "{\"session\":\"${{ steps.session.outputs.session }}\"}"

# Setup: in your GitHub repo, go to Settings → Secrets and variables → Actions,
# and add two repository secrets:
#   BACKEND_URL           e.g. https://your-app.onrender.com
#   APP_SHARED_SECRET     the same value as backend/.env's APP_SHARED_SECRET
